# Render blueprint — static frontend for the pnpm monorepo.
# IMPORTANT: leave Root Directory empty (repo root). Do NOT set it to apps/web.
services:
  - type: web
    name: calendly-clone-web
    runtime: static
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      HUSKY=0 pnpm install --frozen-lockfile &&
      pnpm --filter @calendly/web build
    staticPublishPath: apps/web/dist
    buildFilter:
      paths:
        - apps/web/**
        - packages/shared/**
        - pnpm-workspace.yaml
        - pnpm-lock.yaml
        - package.json
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: 'true'
      - key: HUSKY
        value: '0'
      - key: VITE_API_BASE_URL
        sync: false
