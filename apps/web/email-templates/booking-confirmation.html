<!--
  Paste into EmailJS → Email Templates → Content (code editor).

  Template settings:
    To Email:  {{to_email}}
    To Name:   {{to_name}}
    Subject:   New event: {{event_type}}
-->
<div style="font-family: Arial, Helvetica, sans-serif; color: #1a1a1a; max-width: 600px; margin: 0 auto; padding: 32px 24px; text-align: center;">
  <div style="margin-bottom: 28px;">
    <div style="display: inline-block; width: 52px; height: 52px; background: #006bff; border-radius: 50%; color: #ffffff; font-size: 30px; line-height: 52px; font-weight: 700;">
      C
    </div>
  </div>

  <p style="font-size: 16px; line-height: 1.5; margin: 0 0 8px;">Hi {{recipient_name}},</p>
  <p style="font-size: 16px; line-height: 1.5; margin: 0 0 28px;">A new event has been scheduled.</p>

  <div style="text-align: center; font-size: 15px; line-height: 1.8;">
    <p style="margin: 0 0 16px;">
      <strong>Event Type:</strong><br />
      {{event_type}}
    </p>
    <p style="margin: 0 0 16px;">
      <strong>Invitee:</strong><br />
      {{invitee_name}}
    </p>
    <p style="margin: 0 0 16px;">
      <strong>Invitee Email:</strong><br />
      <a href="mailto:{{invitee_email}}" style="color: #006bff; text-decoration: none;">{{invitee_email}}</a>
    </p>
    <p style="margin: 0 0 16px;">
      <strong>Event Date/Time:</strong><br />
      {{event_date_time}}
    </p>
    <p style="margin: 0 0 28px;">
      <strong>Invitee Time Zone:</strong><br />
      {{invitee_timezone}}
    </p>
  </div>

  <p style="margin: 0;">
    <a href="{{view_event_url}}" style="color: #006bff; font-size: 15px; text-decoration: underline;">View event in Calendly</a>
  </p>
</div>
